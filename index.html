<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hannah 代購訂單管理</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', sans-serif;
  background: #fdf6f8;
  color: #333;
  min-height: 100vh;
}

.header {
  background: linear-gradient(135deg, #f48fb1, #f06292);
  padding: 20px 30px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 2px 12px rgba(240, 98, 146, 0.25);
}

.header h1 { font-size: 20px; color: #fff; font-weight: 700; }
.header .sub { font-size: 12px; color: rgba(255,255,255,0.8); margin-top: 3px; }

.btn-add {
  background: white;
  color: #e91e8c;
  border: none;
  padding: 10px 22px;
  border-radius: 25px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-add:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,0,0,0.16); }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  padding: 22px 30px 0;
}

.stat-card {
  background: white;
  border-radius: 14px;
  padding: 16px 18px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.stat-label { font-size: 11px; color: #aaa; margin-bottom: 6px; letter-spacing: 0.5px; }
.stat-value { font-size: 26px; font-weight: 700; color: #333; }
.stat-card.pink .stat-value { color: #f06292; }
.stat-card.green .stat-value { color: #43a047; }
.stat-card.teal .stat-value { color: #00897b; }

.month-tabs {
  display: flex;
  gap: 8px;
  padding: 18px 30px 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.month-tabs::-webkit-scrollbar { display: none; }
.month-tab {
  padding: 7px 20px;
  border-radius: 25px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  border: 2px solid #f0d5e0;
  background: white;
  color: #bbb;
  transition: all 0.2s;
  user-select: none;
}
.month-tab:hover { border-color: #f06292; color: #f06292; }
.month-tab.active {
  background: linear-gradient(135deg, #f06292, #e91e63);
  border-color: transparent;
  color: white;
  box-shadow: 0 3px 10px rgba(233, 30, 99, 0.3);
}

.filters {
  display: flex;
  gap: 10px;
  padding: 18px 30px;
  align-items: center;
  flex-wrap: wrap;
}

.search-input, .filter-select {
  padding: 9px 14px;
  border: 1.5px solid #f0d5e0;
  border-radius: 10px;
  font-size: 13px;
  outline: none;
  background: white;
  transition: border-color 0.2s;
}
.search-input { flex: 1; min-width: 180px; }
.search-input:focus, .filter-select:focus { border-color: #f06292; }
.filter-select { cursor: pointer; }

.table-wrap {
  padding: 0 30px 50px;
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 14px rgba(0,0,0,0.07);
  min-width: 1100px;
  table-layout: fixed;
}

col.col-date    { width: 75px; }
col.col-name    { width: 110px; }
col.col-phone   { width: 108px; }
col.col-store   { width: 115px; }
col.col-product { width: auto; }
col.col-code    { width: 58px; }
col.col-cost    { width: 80px; }
col.col-price   { width: 80px; }
col.col-profit  { width: 80px; }
col.col-bought  { width: 78px; }
col.col-status  { width: 78px; }
col.col-invoice { width: 90px; }
col.col-note    { width: 100px; }
col.col-action  { width: 76px; }

thead th {
  background: #fce4ec;
  padding: 12px 10px;
  font-size: 12px;
  font-weight: 600;
  color: #c2185b;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

tbody tr {
  border-bottom: 1px solid #fdf0f4;
  transition: background 0.15s;
}
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #fff5f8 !important; }
tbody tr.group-alt { background: #fdf8fb; }

td {
  padding: 10px 10px;
  font-size: 13px;
  color: #444;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.tag-paid {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: #e8f5e9;
  color: #2e7d32;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s;
}
.tag-paid:hover { background: #c8e6c9; }
.tag-unpaid {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: #fff3e0;
  color: #e65100;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s;
}
.tag-unpaid:hover { background: #ffe0b2; }
.tag-bought {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: #e3f2fd;
  color: #1565c0;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s;
}
.tag-bought:hover { background: #bbdefb; }
.tag-notbought {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: #fce4ec;
  color: #c62828;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s;
}
.tag-notbought:hover { background: #f8bbd0; }
.tag-invoiced {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: #ede7f6;
  color: #4527a0;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s;
}
.tag-invoiced:hover { background: #d1c4e9; }
.tag-notinvoiced {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: #f5f5f5;
  color: #9e9e9e;
  cursor: pointer;
  user-select: none;
  transition: all 0.2s;
}
.tag-notinvoiced:hover { background: #eeeeee; }

.profit { color: #2e7d32; font-weight: 600; }
.empty { color: #ccc; }
.note-text { color: #888; font-style: italic; }

.group-cell { vertical-align: middle; }
.customer-name { cursor: pointer; transition: color 0.15s; }
.customer-name:hover b { color: #f06292; text-decoration: underline; }
.customer-name b::after { content: ' 🔍'; font-size: 10px; opacity: 0; transition: opacity 0.15s; }
.customer-name:hover b::after { opacity: 1; }

.btn-edit, .btn-del {
  border: none;
  background: none;
  cursor: pointer;
  padding: 3px 5px;
  border-radius: 6px;
  font-size: 14px;
  transition: background 0.15s;
}
.btn-edit:hover { background: #e3f2fd; }
.btn-del:hover { background: #ffebee; }

.no-data {
  text-align: center;
  padding: 50px;
  color: #ccc;
  font-size: 15px;
}

/* Modal */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.35);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.overlay.on { display: flex; }

.modal {
  background: white;
  border-radius: 20px;
  padding: 28px;
  width: 520px;
  max-width: 95vw;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,0.18);
}

.modal h2 { font-size: 17px; color: #e91e8c; margin-bottom: 20px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 13px; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg.full { grid-column: 1 / -1; }
.fg label { font-size: 11px; color: #aaa; font-weight: 600; letter-spacing: 0.4px; }
.fg input, .fg select, .fg textarea {
  padding: 9px 12px;
  border: 1.5px solid #e8e8e8;
  border-radius: 10px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
  transition: border-color 0.2s;
}
.fg input:focus, .fg select:focus { border-color: #f06292; }

.modal-footer {
  display: flex;
  gap: 10px;
  margin-top: 22px;
  justify-content: flex-end;
}
.btn-save {
  background: linear-gradient(135deg, #f06292, #e91e63);
  color: white;
  border: none;
  padding: 10px 26px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.2s;
}
.btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-cancel {
  background: #f5f5f5;
  color: #666;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
}
.btn-cancel:hover { background: #eeeeee; }

@media (max-width: 600px) {
  .stats { grid-template-columns: repeat(2, 1fr); }
  .header { padding: 16px 18px; }
  .table-wrap, .filters, .stats, .page-nav { padding-left: 14px; padding-right: 14px; }
}

/* ── 頁面切換 ── */
.page-nav {
  background: white;
  border-bottom: 2px solid #fce4ec;
  padding: 0 30px;
  display: flex;
  gap: 0;
}
.page-tab {
  padding: 13px 22px;
  font-size: 14px;
  font-weight: 600;
  color: #ccc;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  transition: all 0.2s;
  user-select: none;
  white-space: nowrap;
}
.page-tab:hover { color: #f06292; }
.page-tab.active { color: #e91e63; border-bottom-color: #e91e63; }

/* ── 成本頁面 ── */
.cost-wrap { padding: 0 30px 50px; overflow-x: auto; }
.cost-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 14px rgba(0,0,0,0.07);
  min-width: 600px;
  table-layout: fixed;
}
.cost-table col.cc-date { width: 80px; }
.cost-table col.cc-cat  { width: 90px; }
.cost-table col.cc-desc { width: auto; }
.cost-table col.cc-amt  { width: 100px; }
.cost-table col.cc-note { width: 120px; }
.cost-table col.cc-act  { width: 76px; }
.cost-table thead th {
  background: #fce4ec;
  padding: 12px 10px;
  font-size: 12px;
  font-weight: 600;
  color: #c2185b;
  text-align: left;
  white-space: nowrap;
}
.cost-table tbody tr { border-bottom: 1px solid #fdf0f4; transition: background 0.15s; }
.cost-table tbody tr:last-child { border-bottom: none; }
.cost-table tbody tr:hover { background: #fff5f8; }
.cost-table td {
  padding: 10px 10px;
  font-size: 13px;
  color: #444;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.cat-badge {
  display: inline-block;
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: #f3e5f5;
  color: #7b1fa2;
}
.cost-amount { font-weight: 600; color: #c62828; }

/* ── 分析頁面 ── */
.analytics-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  padding: 22px 30px 0;
}
.analytics-card {
  background: white;
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  text-align: center;
}
.analytics-card .ac-label { font-size: 11px; color: #aaa; margin-bottom: 8px; letter-spacing: 0.5px; }
.analytics-card .ac-value { font-size: 28px; font-weight: 700; color: #333; }
.analytics-card.revenue .ac-value { color: #00897b; }
.analytics-card.expense .ac-value { color: #e53935; }
.analytics-card.profit  .ac-value { color: #1565c0; }
.breakdown-wrap { padding: 20px 30px 50px; }
.breakdown-title { font-size: 14px; font-weight: 700; color: #555; margin-bottom: 14px; }
.breakdown-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.breakdown-label { font-size: 13px; color: #555; width: 80px; flex-shrink: 0; }
.breakdown-bar-wrap { flex: 1; background: #fce4ec; border-radius: 8px; height: 10px; }
.breakdown-bar { height: 10px; border-radius: 8px; background: linear-gradient(90deg, #f06292, #e91e63); }
.breakdown-amt { font-size: 13px; font-weight: 600; color: #c62828; width: 90px; text-align: right; flex-shrink: 0; }
@media (max-width: 600px) {
  .analytics-grid { grid-template-columns: 1fr 1fr; }
  .cost-wrap, .breakdown-wrap { padding-left: 14px; padding-right: 14px; }
}

#login-screen {
  display: flex;
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg, #fce4ec, #f8bbd0);
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.login-box {
  background: white;
  border-radius: 24px;
  padding: 40px 36px;
  width: 360px;
  max-width: 92vw;
  box-shadow: 0 20px 60px rgba(233,30,99,0.18);
  text-align: center;
}
.login-box h2 { font-size: 20px; color: #e91e8c; margin-bottom: 6px; }
.login-box p  { font-size: 13px; color: #aaa; margin-bottom: 28px; }
.login-field  { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; text-align: left; }
.login-field label { font-size: 11px; color: #aaa; font-weight: 600; }
.login-field input {
  padding: 11px 14px;
  border: 1.5px solid #f0d5e0;
  border-radius: 10px;
  font-size: 14px;
  outline: none;
}
.login-field input:focus { border-color: #f06292; }
.btn-login {
  width: 100%;
  background: linear-gradient(135deg, #f06292, #e91e63);
  color: white;
  border: none;
  padding: 13px;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 8px;
}
.login-error { color: #e53935; font-size: 12px; margin-top: 10px; min-height: 18px; }
#app { display: none; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2>🛍️ Hannah 代購訂單</h2>
    <p>Brandy Melville &middot; Hollister</p>
    <div class="login-field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="your@email.com">
    </div>
    <div class="login-field">
      <label>密碼</label>
      <input type="password" id="login-password" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="btn-login" onclick="login()">登入</button>
  </div>
</div>

<div id="app">

<div class="header">
  <div>
    <div class="h1" style="font-size:20px;color:#fff;font-weight:700;">🛍️ Hannah 代購訂單管理</div>
    <div class="sub">Brandy Melville &middot; Hollister</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;">
    <button class="btn-add" id="hdr-backup"   onclick="exportData()" style="background:rgba(255,255,255,0.2);font-size:13px;padding:8px 14px;">⬇ 備份</button>
    <label  class="btn-add" id="hdr-import"   style="background:rgba(255,255,255,0.2);font-size:13px;padding:8px 14px;cursor:pointer;">⬆ 匯入<input type="file" accept=".json" onchange="importData(event)" style="display:none"></label>
    <button class="btn-add" id="hdr-add-order" onclick="openModal()">＋ 新增訂單</button>
    <button class="btn-add" id="hdr-add-cost"  onclick="openCostModal()" style="display:none;">＋ 新增費用</button>
    <button class="btn-add" onclick="logout()" style="background:rgba(255,255,255,0.15);font-size:13px;padding:8px 14px;">登出</button>
  </div>
</div>

<div class="page-nav">
  <div class="page-tab active" id="tab-orders"    onclick="switchPage('orders')">📦 訂單管理</div>
  <div class="page-tab"        id="tab-costs"     onclick="switchPage('costs')">💰 成本管理</div>
  <div class="page-tab"        id="tab-analytics" onclick="switchPage('analytics')">📊 分析</div>
</div>

<!-- ══ 訂單管理 ══ -->
<div id="page-orders">

<div class="stats">
  <div class="stat-card">
    <div class="stat-label">總商品筆數</div>
    <div class="stat-value" id="s-total">—</div>
  </div>
  <div class="stat-card pink">
    <div class="stat-label">待出貨</div>
    <div class="stat-value" id="s-unpaid">—</div>
  </div>
  <div class="stat-card green">
    <div class="stat-label">已出貨</div>
    <div class="stat-value" id="s-paid">—</div>
  </div>
  <div class="stat-card teal">
    <div class="stat-label">預估總利潤</div>
    <div class="stat-value" id="s-profit">—</div>
  </div>
</div>

<div class="month-tabs" id="monthTabs"></div>

<div class="filters">
  <input class="search-input" type="text" id="q" placeholder="🔍  搜尋姓名、商品…" oninput="render()">
  <select class="filter-select" id="fBought" onchange="render()">
    <option value="">全部購買</option>
    <option value="no">未購買</option>
    <option value="yes">已購買</option>
  </select>
  <select class="filter-select" id="fStatus" onchange="render()">
    <option value="">全部出貨</option>
    <option value="unpaid">待出貨</option>
    <option value="paid">已出貨</option>
  </select>
  <select class="filter-select" id="fInvoice" onchange="render()">
    <option value="">全部發票</option>
    <option value="no">未開發票</option>
    <option value="yes">已開發票</option>
  </select>
</div>

<div class="table-wrap">
  <table>
    <colgroup>
      <col class="col-date"><col class="col-name"><col class="col-phone">
      <col class="col-store"><col class="col-product"><col class="col-code">
      <col class="col-cost"><col class="col-price"><col class="col-profit">
      <col class="col-bought"><col class="col-status"><col class="col-invoice"><col class="col-note"><col class="col-action">
    </colgroup>
    <thead>
      <tr>
        <th>日期</th>
        <th>客戶姓名</th>
        <th>聯絡電話</th>
        <th>取貨門市</th>
        <th>商品名稱</th>
        <th>貨號</th>
        <th>成本</th>
        <th>售價</th>
        <th>利潤</th>
        <th>購買</th>
        <th>出貨</th>
        <th>發票</th>
        <th>備註</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

</div><!-- /page-orders -->

<!-- ══ 成本管理 ══ -->
<div id="page-costs" style="display:none;">
  <div class="month-tabs" id="costMonthTabs"></div>
  <div class="stats" style="grid-template-columns:repeat(2,1fr);">
    <div class="stat-card pink">
      <div class="stat-label">當月支出筆數</div>
      <div class="stat-value" id="cs-count">—</div>
    </div>
    <div class="stat-card" style="border-left:4px solid #e53935;">
      <div class="stat-label">當月支出合計</div>
      <div class="stat-value" style="color:#e53935;" id="cs-total">—</div>
    </div>
  </div>
  <div class="cost-wrap">
    <table class="cost-table">
      <colgroup><col class="cc-date"><col class="cc-cat"><col class="cc-desc"><col class="cc-amt"><col class="cc-note"><col class="cc-act"></colgroup>
      <thead><tr><th>日期</th><th>類別</th><th>說明</th><th>金額</th><th>備註</th><th></th></tr></thead>
      <tbody id="cost-tbody"></tbody>
    </table>
  </div>
</div>

<!-- ══ 分析 ══ -->
<div id="page-analytics" style="display:none;">
  <div class="month-tabs" id="analyticsMonthTabs"></div>
  <div class="analytics-grid">
    <div class="analytics-card revenue">
      <div class="ac-label">訂單收入</div>
      <div class="ac-value" id="an-revenue">—</div>
    </div>
    <div class="analytics-card expense">
      <div class="ac-label">支出合計</div>
      <div class="ac-value" id="an-expense">—</div>
    </div>
    <div class="analytics-card profit">
      <div class="ac-label">淨利潤</div>
      <div class="ac-value" id="an-profit">—</div>
    </div>
  </div>
  <div class="breakdown-wrap">
    <div class="breakdown-title">支出類別明細</div>
    <div id="an-breakdown"></div>
  </div>
</div>

<!-- ══ 訂單 Modal ══ -->
<div class="overlay" id="overlay" onclick="bgClose(event)">
  <div class="modal">
    <h2 id="modal-title">新增訂單</h2>
    <div class="form-grid">
      <div class="fg"><label>訂購日期</label><input type="date" id="f-date"></div>
      <div class="fg"><label>客戶姓名 *</label><input type="text" id="f-customer" placeholder="婷💗"></div>
      <div class="fg"><label>聯絡電話</label><input type="text" id="f-phone" placeholder="0988841617"></div>
      <div class="fg"><label>取貨門市</label><input type="text" id="f-store" placeholder="勝新門市"></div>
      <div class="fg full"><label>商品名稱 *</label><input type="text" id="f-product" placeholder="小海鷗粉條紋吊帶"></div>
      <div class="fg"><label>貨號 / SKU</label><input type="text" id="f-sku" placeholder="BM-001"></div>
      <div class="fg"><label>購買狀態</label>
        <select id="f-bought">
          <option value="no">未購買</option>
          <option value="yes">已購買</option>

      <div class="fg"><label>售價（NT$）</label><input type="number" id="f-price" placeholder="0" min="0"></div>
      <div class="fg full"><label>備註</label><input type="text" id="f-note" placeholder="尺寸、顏色…"></div>

const SUPABASE_URL = 'https://hvjqipwvoaaqipdgelbu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh2anFpcHd2b2FhcWlwZGdlbGJ1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MDk4NTcsImV4cCI6MjA5MjQ4NTg1N30.UNLVPrYA4I1mmBjhRW7H_Jww3CeHm4-xxlxrMCx45rM';
const { createClient } = supabase;

const SEED_PLACEHOLDER = [];

let data = [];
let editId = null;
let selectedMonth = '';

function fromRow(r) {
  return {
    id: r.id,
    date: r.date || '',
    customer: r.customer || '',
    phone: r.phone || '',
    store: r.store || '',
    product: r.product || '',
    sku: r.item_code || '',
    cost: r.cost || '',
    price: r.price || '',
    status: r.status || 'unpaid',
    note: r.note || '',
    bought: r.bought || 'no',
    invoiced: r.invoiced || 'no',
  };
}

function toRow(o) {
  return {
    id: o.id,
    date: o.date,
    customer: o.customer,
    phone: o.phone || '',
    store: o.store || '',
    product: o.product,
    item_code: o.sku || o.itemCode || '',
    cost: o.cost || '',
    price: o.price || '',
    status: o.status || 'unpaid',
    note: o.note || '',
    bought: o.bought || 'no',
    invoiced: o.invoiced || 'no',
  };
}

async function load() {
  document.getElementById('tbody').innerHTML = '<tr><td colspan="14" class="no-data">載入中…</td></tr>';
  const { data: rows, error } = await sb.from('orders').select('*').order('date').order('id');
  if (error) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="13" class="no-data">載入失敗，請重新整理</td></tr>';
    console.error(error);
    return;
  }
  data = rows.map(fromRow);
  updateMonthTabs();
  updateStats();
  render();
}

function exportData() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const filename = `hannah-orders-${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}.json`;
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

async function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error('格式錯誤');
      if (!confirm(`確定要匯入 ${imported.length} 筆訂單？這會清除雲端所有現有資料。`)) return;
      await sb.from('orders').delete().gte('id', 0);
      const rows = imported.map(o => toRow(o));
      for (let i = 0; i < rows.length; i += 100) {
        const { error } = await sb.from('orders').insert(rows.slice(i, i + 100));
        if (error) throw error;
      }
      data = imported.map(fromRow);
      updateMonthTabs();
      updateStats();
      render();
      alert('匯入成功！');
    } catch(err) {
      console.error(err);
      alert('匯入失敗：' + (err.message || '請確認檔案格式'));
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function nextId() {
  return data.length ? Math.max(...data.map(o => o.id)) + 1 : 1;
}

function fmtDate(d) {
  if (!d) return '<span class="empty">—</span>';
  const dt = new Date(d + 'T00:00:00');
  return `${dt.getMonth()+1}/${dt.getDate()}`;
}

function fmtMoney(v) {
  if (v === '' || v === null || v === undefined) return '<span class="empty">—</span>';
  return `NT$${Number(v).toLocaleString()}`;
}

function calcProfit(o) {
  if (o.cost === '' || o.price === '') return '<span class="empty">—</span>';
  const p = (parseFloat(o.price)||0) - (parseFloat(o.cost)||0);
  return `<span class="profit">NT$${p.toLocaleString()}</span>`;
}

function filtered() {
  const q = document.getElementById('q').value.toLowerCase();
  const st = document.getElementById('fStatus').value;
  const bt = document.getElementById('fBought').value;
  const inv = document.getElementById('fInvoice').value;
  return data.filter(o => {
    if (selectedMonth && !o.date.startsWith(selectedMonth)) return false;
    if (st && o.status !== st) return false;
    if (bt && (o.bought || 'no') !== bt) return false;
    if (inv && (o.invoiced || 'no') !== inv) return false;
    if (q) {
      const txt = [o.customer, o.product, o.phone, o.store, o.note].join('').toLowerCase();
      if (!txt.includes(q)) return false;
    }
    return true;
  }).sort((a, b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
}

function updateMonthTabs() {
  const months = [...new Set(data.map(o => o.date.slice(0, 7)))].sort().reverse();
  const container = document.getElementById('monthTabs');
  const all = `<div class="month-tab ${selectedMonth === '' ? 'active' : ''}" onclick="selectMonth('')">全部</div>`;
  const tabs = months.map(m => {
    const mo = parseInt(m.split('-')[1]);
    const yr = m.split('-')[0];
    const curYear = String(new Date().getFullYear());
    const label = yr === curYear ? `${mo}月` : `${yr}/${mo}月`;
    return `<div class="month-tab ${selectedMonth === m ? 'active' : ''}" onclick="selectMonth('${m}')">${label}</div>`;
  }).join('');
  container.innerHTML = all + tabs;
}

function selectMonth(m) {
  selectedMonth = m;
  updateMonthTabs();
  updateStats();
  render();
}

function updateStats() {
  const rows = selectedMonth ? data.filter(o => o.date.startsWith(selectedMonth)) : data;
  document.getElementById('s-total').textContent = rows.length;
  document.getElementById('s-unpaid').textContent = rows.filter(o => o.status === 'unpaid').length;
  document.getElementById('s-paid').textContent   = rows.filter(o => o.status === 'paid').length;
  let profit = 0, hasAny = false;
  rows.forEach(o => {
    if (o.cost !== '' && o.price !== '') {
      profit += (parseFloat(o.price)||0) - (parseFloat(o.cost)||0);
      hasAny = true;
    }
  });
  document.getElementById('s-profit').textContent = hasAny ? `NT$${profit.toLocaleString()}` : '—';
}

function render() {
  const rows = filtered();
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="14" class="no-data">沒有符合的訂單 🔍</td></tr>`;
    return;
  }

  // Pre-compute rowspan: spans[i] = group size for first row, 0 for subsequent rows
  const spans = new Array(rows.length).fill(0);
  let i = 0;
  while (i < rows.length) {
    const key = `${rows[i].date}||${rows[i].customer}`;
    let span = 1;
    while (i + span < rows.length && `${rows[i+span].date}||${rows[i+span].customer}` === key) span++;
    spans[i] = span;
    i += span;
  }

  let grpKey = '', grpIdx = -1;
  tbody.innerHTML = rows.map((o, idx) => {
    const k = `${o.date}||${o.customer}`;
    if (k !== grpKey) { grpKey = k; grpIdx++; }
    const alt = grpIdx % 2 === 1 ? 'group-alt' : '';
    const isFirst = spans[idx] > 0;
    const span = spans[idx];

    const boughtBadge = (o.bought === 'yes')
      ? `<span class="tag-bought" onclick="toggleBought(${o.id})">✓ 已購買</span>`
      : `<span class="tag-notbought" onclick="toggleBought(${o.id})">未購買</span>`;

    const badge = o.status === 'paid'
      ? `<span class="tag-paid" onclick="toggleStatus(${o.id})">✓ 已出貨</span>`
      : `<span class="tag-unpaid" onclick="toggleStatus(${o.id})">待出貨</span>`;

    const invoiceBadge = (o.invoiced === 'yes')
      ? `<span class="tag-invoiced" onclick="toggleInvoice(${o.id})">✓ 已開發票</span>`
      : `<span class="tag-notinvoiced" onclick="toggleInvoice(${o.id})">未開發票</span>`;

    const noteCell = o.note
      ? `<span class="note-text">${o.note}</span>`
      : `<span class="empty">—</span>`;

    const safeCustomer = o.customer.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const groupCells = isFirst ? `
      <td rowspan="${span}" class="group-cell">${fmtDate(o.date)}</td>
      <td rowspan="${span}" class="group-cell customer-name" onclick="filterCustomer('${safeCustomer}')"><b>${o.customer || '—'}</b></td>
      <td rowspan="${span}" class="group-cell">${o.phone || '<span class="empty">—</span>'}</td>
      <td rowspan="${span}" class="group-cell">${o.store || '<span class="empty">—</span>'}</td>` : '';

    return `<tr class="${alt}">
      ${groupCells}
      <td>${o.product || '<span class="empty">—</span>'}</td>
      <td>${o.sku || '<span class="empty">—</span>'}</td>
      <td>${fmtMoney(o.cost)}</td>
      <td>${fmtMoney(o.price)}</td>
      <td>${calcProfit(o)}</td>
      <td>${boughtBadge}</td>
      <td>${badge}</td>
      <td>${invoiceBadge}</td>
      <td>${noteCell}</td>
      <td>
        <button class="btn-edit" onclick="openModal(${o.id})" title="編輯">✏️</button>
        <button class="btn-del"  onclick="del(${o.id})" title="刪除">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

function filterCustomer(name) {
  document.getElementById('q').value = name;
  selectedMonth = '';
  updateMonthTabs();
  updateStats();
  render();
}

async function toggleBought(id) {
  const o = data.find(x => x.id === id);
  if (!o) return;
  o.bought = o.bought === 'yes' ? 'no' : 'yes';
  render();
  await sb.from('orders').update({ bought: o.bought }).eq('id', id);
}

async function toggleInvoice(id) {
  const o = data.find(x => x.id === id);
  if (!o) return;
  o.invoiced = o.invoiced === 'yes' ? 'no' : 'yes';
  render();
  await sb.from('orders').update({ invoiced: o.invoiced }).eq('id', id);
}

async function toggleStatus(id) {
  const o = data.find(x => x.id === id);
  if (!o) return;
  o.status = o.status === 'paid' ? 'unpaid' : 'paid';
  updateStats();
  render();
  await sb.from('orders').update({ status: o.status }).eq('id', id);
}

async function del(id) {
  if (!confirm('確定刪除這筆訂單？')) return;
  data = data.filter(x => x.id !== id);
  updateMonthTabs();
  updateStats();
  render();
  await sb.from('orders').delete().eq('id', id);
}

function openModal(id = null) {
  editId = id;
  document.getElementById('modal-title').textContent = id ? '編輯訂單' : '新增訂單';
  if (id) {
    const o = data.find(x => x.id === id);
    document.getElementById('f-date').value     = o.date;
    document.getElementById('f-customer').value = o.customer;
    document.getElementById('f-phone').value    = o.phone;
    document.getElementById('f-store').value    = o.store;
    document.getElementById('f-product').value  = o.product;
    document.getElementById('f-sku').value      = o.sku;
    document.getElementById('f-cost').value     = o.cost;
    document.getElementById('f-price').value    = o.price;
    document.getElementById('f-bought').value   = o.bought || 'no';
    document.getElementById('f-status').value   = o.status;
    document.getElementById('f-note').value     = o.note;
  } else {
    const today = new Date();
    const ymd = today.toLocaleDateString('sv-SE', {timeZone:'Asia/Taipei'});
    document.getElementById('f-date').value     = ymd;
    document.getElementById('f-customer').value = '';
    document.getElementById('f-phone').value    = '';
    document.getElementById('f-store').value    = '';
    document.getElementById('f-product').value  = '';
    document.getElementById('f-sku').value      = '';
    document.getElementById('f-cost').value     = '';
    document.getElementById('f-price').value    = '';
    document.getElementById('f-bought').value   = 'no';
    document.getElementById('f-status').value   = 'unpaid';
    document.getElementById('f-note').value     = '';
  }
  document.getElementById('overlay').classList.add('on');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('on');
  editId = null;
}

function bgClose(e) {
  if (e.target === document.getElementById('overlay')) closeModal();
}

async function save() {
  const customer = document.getElementById('f-customer').value.trim();
  const product  = document.getElementById('f-product').value.trim();
  if (!customer || !product) {
    alert('客戶姓名和商品名稱不能空白！');
    return;
  }
  const row = {
    date:     document.getElementById('f-date').value,
    customer,
    phone:    document.getElementById('f-phone').value.trim(),
    store:    document.getElementById('f-store').value.trim(),
    product,
    sku:      document.getElementById('f-sku').value.trim(),
    cost:     document.getElementById('f-cost').value,
    price:    document.getElementById('f-price').value,
    bought:   document.getElementById('f-bought').value,
    status:   document.getElementById('f-status').value,
    note:     document.getElementById('f-note').value.trim(),
  };
  if (editId) {
    const targetId = Number(editId);
    const idx = data.findIndex(x => Number(x.id) === targetId);
    if (idx === -1) {
      alert('⚠️ 找不到訂單（id=' + targetId + '），請重新整理後再試');
      return;
    }
    data[idx] = { ...data[idx], ...row };
    updateMonthTabs();
    updateStats();
    render();
    const updatePayload = toRow(data[idx]);
    delete updatePayload.id;
    const { error } = await sb.from('orders').update(updatePayload).eq('id', targetId);
    closeModal();
    if (error) {
      alert('⚠️ 儲存失敗（id=' + targetId + '）\n' + error.message);
      console.error('Update error:', error);
    }
  } else {
    const newId = nextId();
    const newRow = { id: newId, ...row };
    data.push(newRow);
    closeModal();
    updateMonthTabs();
    updateStats();
    render();
    const { error } = await sb.from('orders').insert(toRow(newRow));
    if (error) {
      console.error('Insert error:', error);
      data = data.filter(x => x.id !== newRow.id);
      updateMonthTabs();
      updateStats();
      render();
      if (error.message && (error.message.includes('JWT') || error.message.includes('auth') || error.message.includes('token'))) {
        alert('⚠️ 登入已過期，訂單未儲存！\n請重新登入後再新增。');
        logout();
      } else {
        alert('⚠️ 訂單新增失敗：' + error.message + '\n請重新整理後再試。');
      }
    }
  }
}

/* ══════════════ 頁面切換 ══════════════ */
let currentPage = 'orders';

function switchPage(page) {
  currentPage = page;
  ['orders','costs','analytics'].forEach(p => {
    document.getElementById('page-' + p).style.display = p === page ? '' : 'none';
    document.getElementById('tab-' + p).classList.toggle('active', p === page);
  });
  document.getElementById('hdr-add-order').style.display = page === 'orders' ? '' : 'none';
  document.getElementById('hdr-add-cost').style.display  = page === 'costs'   ? '' : 'none';
  document.getElementById('hdr-backup').style.display    = page === 'orders'  ? '' : 'none';
  document.getElementById('hdr-import').style.display    = page === 'orders'  ? '' : 'none';
  if (page === 'costs')     { renderCostMonthTabs(); renderCosts(); }
  if (page === 'analytics') { renderAnalyticsMonthTabs(); renderAnalytics(); }
}

/* ══════════════ 成本管理 ══════════════ */
let costsData = [];
let costEditId = null;
let selectedCostMonth = '';

async function loadCosts() {
  const { data: rows, error } = await sb.from('costs').select('*').order('date').order('id');
  if (error) { console.error(error); return; }
  costsData = rows.map(r => ({
    id: r.id, date: r.date || '', category: r.category || '',
    description: r.description || '', amount: r.amount ?? '', note: r.note || ''
  }));
  if (currentPage === 'costs') { renderCostMonthTabs(); renderCosts(); }
  renderAnalyticsMonthTabs();
  renderAnalytics();
}

function renderCostMonthTabs() {
  const months = [...new Set(costsData.map(o => (o.date||'').slice(0,7)))].filter(Boolean).sort().reverse();
  const container = document.getElementById('costMonthTabs');
  const all = `<div class="month-tab ${selectedCostMonth===''?'active':''}" onclick="selectCostMonth('')">全部</div>`;
  const tabs = months.map(m => {
    const mo = parseInt(m.split('-')[1]);
    const yr = m.split('-')[0];
    const curYear = String(new Date().getFullYear());
    const label = yr === curYear ? mo+'月' : yr+'/'+mo+'月';
    return `<div class="month-tab ${selectedCostMonth===m?'active':''}" onclick="selectCostMonth('${m}')">${label}</div>`;
  }).join('');
  container.innerHTML = all + tabs;
}

function selectCostMonth(m) {
  selectedCostMonth = m;
  renderCostMonthTabs();
  renderCosts();
}

function filteredCosts() {
  return costsData.filter(o => !selectedCostMonth || o.date.startsWith(selectedCostMonth))
    .sort((a,b) => a.date < b.date ? -1 : a.date > b.date ? 1 : 0);
}

function renderCosts() {
  const rows = filteredCosts();
  const tbody = document.getElementById('cost-tbody');
  const total = rows.reduce((s,o) => s + (parseFloat(o.amount)||0), 0);
  document.getElementById('cs-count').textContent = rows.length;
  document.getElementById('cs-total').textContent = rows.length ? 'NT$'+total.toLocaleString() : '—';
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="no-data">尚無費用紀錄</td></tr>'; return;
  }
  tbody.innerHTML = rows.map(o => `
    <tr>
      <td>${fmtDate(o.date)}</td>
      <td><span class="cat-badge">${o.category}</span></td>
      <td>${o.description || '<span class="empty">—</span>'}</td>
      <td class="cost-amount">${o.amount !== '' ? 'NT$'+Number(o.amount).toLocaleString() : '<span class="empty">—</span>'}</td>
      <td>${o.note || '<span class="empty">—</span>'}</td>
      <td>
        <button class="btn-edit" onclick="openCostModal(${o.id})" title="編輯">✏️</button>
        <button class="btn-del"  onclick="delCost(${o.id})" title="刪除">🗑️</button>
      </td>
    </tr>`).join('');
}

function openCostModal(id = null) {
  costEditId = id;
  document.getElementById('cost-modal-title').textContent = id ? '編輯費用' : '新增費用';
  if (id) {
    const o = costsData.find(x => x.id === id);
    document.getElementById('cf-date').value        = o.date;
    document.getElementById('cf-category').value    = o.category;
    document.getElementById('cf-description').value = o.description;
    document.getElementById('cf-amount').value      = o.amount;
    document.getElementById('cf-note').value        = o.note;
  } else {
    const ymd = new Date().toLocaleDateString('sv-SE', {timeZone:'Asia/Taipei'});
    document.getElementById('cf-date').value        = ymd;
    document.getElementById('cf-category').value    = '運費';
    document.getElementById('cf-description').value = '';
    document.getElementById('cf-amount').value      = '';
    document.getElementById('cf-note').value        = '';
  }
  document.getElementById('cost-overlay').classList.add('on');
}

function closeCostModal() {
  document.getElementById('cost-overlay').classList.remove('on');
  costEditId = null;
}

function bgCloseCost(e) {
  if (e.target === document.getElementById('cost-overlay')) closeCostModal();
}

async function saveCost() {
  const description = document.getElementById('cf-description').value.trim();
  const amount = document.getElementById('cf-amount').value;
  if (!description || amount === '') { alert('說明和金額不能空白！'); return; }
  const row = {
    date: document.getElementById('cf-date').value,
    category: document.getElementById('cf-category').value,
    description,
    amount: parseFloat(amount),
    note: document.getElementById('cf-note').value.trim(),
  };
  if (costEditId) {
    const targetId = Number(costEditId);
    const idx = costsData.findIndex(x => Number(x.id) === targetId);
    if (idx !== -1) costsData[idx] = { ...costsData[idx], ...row };
    renderCostMonthTabs(); renderCosts(); renderAnalytics();
    const { error } = await sb.from('costs').update(row).eq('id', targetId);
    closeCostModal();
    if (error) alert('⚠️ 儲存失敗\n' + error.message);
  } else {
    const newId = costsData.length ? Math.max(...costsData.map(o => o.id)) + 1 : 1;
    const newRow = { id: newId, ...row };
    costsData.push(newRow);
    renderCostMonthTabs(); renderCosts(); renderAnalytics();
    const { error } = await sb.from('costs').insert(newRow);
    closeCostModal();
    if (error) alert('⚠️ 新增失敗\n' + error.message);
  }
}

async function delCost(id) {
  if (!confirm('確定刪除這筆費用？')) return;
  costsData = costsData.filter(x => x.id !== id);
  renderCostMonthTabs(); renderCosts(); renderAnalytics();
  await sb.from('costs').delete().eq('id', id);
}

/* ══════════════ 分析 ══════════════ */
let selectedAnalyticsMonth = '';

function renderAnalyticsMonthTabs() {
  const orderMonths = data.map(o => (o.date||'').slice(0,7));
  const costMonths  = costsData.map(o => (o.date||'').slice(0,7));
  const months = [...new Set([...orderMonths, ...costMonths])].filter(Boolean).sort().reverse();
  const container = document.getElementById('analyticsMonthTabs');
  if (!container) return;
  if (!selectedAnalyticsMonth && months.length) selectedAnalyticsMonth = months[0];
  const all = `<div class="month-tab ${selectedAnalyticsMonth===''?'active':''}" onclick="selectAnalyticsMonth('')">全部</div>`;
  const tabs = months.map(m => {
    const mo = parseInt(m.split('-')[1]);
    const yr = m.split('-')[0];
    const curYear = String(new Date().getFullYear());
    const label = yr === curYear ? mo+'月' : yr+'/'+mo+'月';
    return `<div class="month-tab ${selectedAnalyticsMonth===m?'active':''}" onclick="selectAnalyticsMonth('${m}')">${label}</div>`;
  }).join('');
  container.innerHTML = all + tabs;
}

function selectAnalyticsMonth(m) {
  selectedAnalyticsMonth = m;
  renderAnalyticsMonthTabs();
  renderAnalytics();
}

function renderAnalytics() {
  const container = document.getElementById('an-breakdown');
  if (!container) return;
  const orders = selectedAnalyticsMonth ? data.filter(o => o.date.startsWith(selectedAnalyticsMonth)) : data;
  const costs  = selectedAnalyticsMonth ? costsData.filter(o => o.date.startsWith(selectedAnalyticsMonth)) : costsData;

  let revenue = 0;
  orders.forEach(o => { if (o.price !== '') revenue += parseFloat(o.price)||0; });

  let expense = 0;
  costs.forEach(o => { expense += parseFloat(o.amount)||0; });

  const profit = revenue - expense;

  document.getElementById('an-revenue').textContent = revenue ? 'NT$'+revenue.toLocaleString() : '—';
  document.getElementById('an-expense').textContent = expense ? 'NT$'+expense.toLocaleString() : '—';
  document.getElementById('an-profit').textContent  = (revenue || expense) ? 'NT$'+profit.toLocaleString() : '—';
  document.getElementById('an-profit').style.color  = profit >= 0 ? '#1565c0' : '#e53935';

  const cats = ['運費','包材','營業稅','雜費'];
  const bycat = {};
  cats.forEach(c => bycat[c] = 0);
  costs.forEach(o => { if (bycat[o.category] !== undefined) bycat[o.category] += parseFloat(o.amount)||0; });
  const maxAmt = Math.max(...Object.values(bycat), 1);
  container.innerHTML = cats.map(cat => {
    const amt = bycat[cat];
    const pct = Math.round(amt / maxAmt * 100);
    return `<div class="breakdown-row">
      <div class="breakdown-label">${cat}</div>
      <div class="breakdown-bar-wrap"><div class="breakdown-bar" style="width:${pct}%"></div></div>
      <div class="breakdown-amt">${amt ? 'NT$'+amt.toLocaleString() : '—'}</div>
    </div>`;
  }).join('');
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  document.getElementById('login-error').textContent = '';
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    document.getElementById('login-error').textContent = 'Email 或密碼錯誤，請再試一次';
    return;
  }
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  load();
  loadCosts();
}

async function logout() {
  await sb.auth.signOut();
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
  data = []; costsData = [];
}

sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_OUT') {
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
    data = []; costsData = [];
  }
});

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    load();
    loadCosts();
  }
})();
</script>
